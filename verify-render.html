<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { width: 320px; border-radius: 20px; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 20px; border: 1px solid #ddd; }
        .img-container { width: 100%; height: 240px; background: #eee; position: relative; }
        img { width: 100%; height: 100%; object-cover: cover; display: block; }
        .label { padding: 20px; font-weight: bold; color: #333; text-align: center; font-size: 18px; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
    <h1>Carousel Image Verification</h1>
    <div class="grid">
        <div class="card">
            <div class="img-container">
                <img src="https://image.pollinations.ai/prompt/Professional%20high-quality%20business%20photography%20of%20Software%20Office?width=1024&height=1024&nologo=true&seed=1&model=flux" alt="Business Office">
            </div>
            <div class="label">Software Office</div>
        </div>
        <div class="card">
            <div class="img-container">
                <img src="https://image.pollinations.ai/prompt/Professional%20high-quality%20business%20photography%20of%20Tamil%20Catering?width=1024&height=1024&nologo=true&seed=2&model=flux" alt="Catering Service">
            </div>
            <div class="label">Tamil Catering</div>
        </div>
    </div>
</body>
</html>
